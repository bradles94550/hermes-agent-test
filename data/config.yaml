# Hermes Agent Configuration
# Mac Mini homelab — log monitoring experiment

# =============================================================================
# Model: local Ollama (gemma4:e4b already pulled)
# =============================================================================
model:
  default: "gemma4:e4b"

  # Use "custom" (not "ollama") — the alias "ollama" is only for CLI selection,
  # the stored config value must be "custom" for the provider resolver to use base_url
  provider: "custom"
  base_url: "http://host.docker.internal:11434/v1"

  # Override Hermes's 64K minimum context check. Gemma4:e4b defaults to 8K
  # in Ollama but supports higher num_ctx if set. For our short log-monitoring
  # tasks, real conversations stay well under 8K. This override bypasses
  # the minimum check — responses will be truncated at Ollama's actual limit.
  context_length: 131072

  # Cap output tokens for cost/latency control
  max_tokens: 2048

# =============================================================================
# Terminal: local execution INSIDE the container
#
# NOTE: env_type=docker would require Docker socket access to spin up sibling
# containers — that breaks the "no host credentials" security posture.
# Running "local" inside a Docker container IS the isolation layer.
# =============================================================================
terminal:
  backend: "local"
  cwd: "/opt/data/workspace"
  timeout: 120
  lifetime_seconds: 300

# =============================================================================
# Gateways
# =============================================================================
# Start with CLI only. REST API available for remote ad-hoc queries.
# Telegram can be added later (needs bot token in .env).
cli:
  enabled: true

# REST API gateway — listens on 0.0.0.0:8765 inside the container.
# Expose via Tailscale by adding a port mapping when needed.
# Currently NOT exposed in docker-compose (no ports: block) — CLI only.
rest:
  enabled: false
  host: "0.0.0.0"
  port: 8765

# =============================================================================
# Memory
# =============================================================================
memory:
  # Hermes will persist memories here (inside /opt/data/memories/)
  enabled: true

# =============================================================================
# Cron scheduler
# =============================================================================
cron:
  enabled: true
  # Jobs defined in /opt/data/cron/jobs.json
  # Output written to /opt/data/cron/output/{job_id}/{timestamp}.md

# =============================================================================
# Skills
# =============================================================================
skills:
  # Directory scanned for skill definitions
  extra_dirs:
    - "/opt/data/skills"
